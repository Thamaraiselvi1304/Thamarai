<!doctype html>
<html>
  <head>
    <title>Todo List</title>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      .centertext {
        text-align: center;
      }

      .main {
        width: 100%;
        height: 100vh;
        background-color: #4ea9e6a4;
        position: relative;
        overflow-y: hidden;
      }
      .main h1 {
        margin: 0;
      }
      h1::before {
        content: "📋 ";
      }
      h1 + .container {
        border: solid 2px rgb(0, 149, 255);
      }
      .container {
        width: 50vw;
        height: 50vh;
        background-color: antiquewhite;
        left: 25vw;
        top: 25vh;
        position: absolute;
        border-radius: 10px;
      }
      li:nth-child(2n + 2) {
        color: red;
      }
      .box1 {
        width: 90%;
        height: 200px;
        background-color: rgb(174, 174, 246);
        border-radius: 10px solid rgb(130, 130, 230);
        padding: 20px;
        box-sizing: border-box;
        margin: 10px;
        display: inline-block;
      }
      .box1 + p { 
        color:rgb(245, 13, 5)
      }
      div ~ p {
        color:rgb(60, 0, 255);
      }
      .float {
        float: right;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <h1 class="centertext">Todo List</h1>
      <div class="container">
        <ul>
          <li>Angular</li>
          <li>React</li>
          <li>Vue</li>
        </ul>
        <div class="box1">
          <img
            src="https://t3.ftcdn.net/jpg/02/59/31/70/360_F_259317013_nJJaBgGGzvXMd6cAyLd6yMJtbdnd61wk.jpg"
            alt="icon"
            width="50px"
            height="50px"
            class="float"/>
          <span>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Delectus
            laboriosam explicabo laborum dicta asperiores quam omnis ab alias
            earum. Accusamus alias necessitatibus dolorum aspernatur a sint
            corrupti totam ab consectetur!
          </span>
          <p>para1</p>
        </div>
        <p>para2</p>
         <p>para3</p>
          <p>para4</p>
      </div>
    </div>
  </body>
</html>
